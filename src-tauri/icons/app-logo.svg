<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="254" rx="110" fill="url(#shine)"/>

  <!-- 终端窗口 -->
  <rect x="72" y="88" width="368" height="296" rx="28" fill="rgba(0,0,0,0.25)"/>
  <rect x="72" y="88" width="368" height="296" rx="28" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>

  <!-- 标题栏背景 -->
  <rect x="72" y="88" width="368" height="52" rx="28" fill="rgba(0,0,0,0.15)"/>
  <rect x="72" y="112" width="368" height="28" fill="rgba(0,0,0,0.15)"/>
  <line x1="72" y1="140" x2="440" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- 窗口控制按钮 -->
  <circle cx="108" cy="114" r="10" fill="#ff5f57"/>
  <circle cx="140" cy="114" r="10" fill="#ffbd2e"/>
  <circle cx="172" cy="114" r="10" fill="#28c840"/>

  <!-- SSH 提示符 > _ -->
  <polyline points="120,200 176,248 120,296" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="296" x2="310" y2="296" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.85"/>

  <!-- 连接线条 (网络节点感) -->
  <circle cx="370" cy="188" r="16" fill="rgba(255,255,255,0.9)"/>
  <circle cx="370" cy="248" r="12" fill="rgba(255,255,255,0.6)"/>
  <circle cx="370" cy="300" r="8" fill="rgba(255,255,255,0.4)"/>
  <line x1="370" y1="204" x2="370" y2="236" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <line x1="370" y1="260" x2="370" y2="292" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>

  <!-- 右下角齿轮 -->
  <g transform="translate(356, 340)">
    <circle cx="44" cy="44" r="18" stroke="rgba(255,255,255,0.8)" stroke-width="7" fill="none"/>
    <line x1="44" y1="18" x2="44" y2="28" stroke="rgba(255,255,255,0.8)" stroke-width="7" stroke-linecap="round"/>
    <line x1="44" y1="60" x2="44" y2="70" stroke="rgba(255,255,255,0.8)" stroke-width="7" stroke-linecap="round"/>
    <line x1="18" y1="44" x2="28" y2="44" stroke="rgba(255,255,255,0.8)" stroke-width="7" stroke-linecap="round"/>
    <line x1="60" y1="44" x2="70" y2="44" stroke="rgba(255,255,255,0.8)" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
