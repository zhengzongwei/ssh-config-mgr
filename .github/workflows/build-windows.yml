name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Upload Windows installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: ssh-config-mgr-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: ssh-config-mgr-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload raw executable
        uses: actions/upload-artifact@v4
        with:
          name: ssh-config-mgr-windows-exe
          path: src-tauri/target/release/ssh-config-mgr.exe
          if-no-files-found: warn
