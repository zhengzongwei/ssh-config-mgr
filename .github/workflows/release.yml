name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────
          - name: Windows x86_64
            platform: windows-latest
            target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            platform: windows-latest
            target: aarch64-pc-windows-msvc

          # ── macOS ────────────────────────────────────────────────
          - name: macOS Intel (x86_64)
            platform: macos-13          # Intel runner
            target: x86_64-apple-darwin

          - name: macOS Apple Silicon (ARM64)
            platform: macos-latest      # M1/M2 runner
            target: aarch64-apple-darwin

          # ── Linux ────────────────────────────────────────────────
          - name: Linux x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - name: Linux ARM64
            platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      # ── Linux x86_64 依赖 ──────────────────────────────────────
      - name: Install Linux x86_64 dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      # ── Linux ARM64 交叉编译依赖 ───────────────────────────────
      - name: Install Linux ARM64 cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # 将现有源限定为 amd64，避免冲突
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          # 添加 ARM64 ports 源
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null << 'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 libssl-dev:arm64 \
            libgtk-3-dev:arm64 libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 patchelf
          # 设置交叉编译环境变量
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      # ── 从 tag 中提取版本号并注入到各版本文件 ─────────────────
      - name: Set version from tag
        shell: bash
        run: |
          # tag 格式: v0.0.1-beta.1 → 去掉前缀 v → 0.0.1-beta.1
          # Tauri/Cargo 只接受 semver，取主版本部分 0.0.1
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}"                          # 0.0.1-beta.1
          SEMVER="${VERSION%%-*}"                         # 0.0.1（去掉预发布标识）
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SEMVER=${SEMVER}"       >> $GITHUB_ENV
          # 更新 package.json 版本
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${SEMVER}'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          # 更新 tauri.conf.json 版本
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); p.version='${SEMVER}'; fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n')"
          # 更新 Cargo.toml 版本
          sed -i "s/^version = \".*\"/version = \"${SEMVER}\"/" src-tauri/Cargo.toml
          echo "Version set to ${VERSION} (semver: ${SEMVER})"

      # ── 构建 & 发布到 GitHub Release ───────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ env.APP_VERSION }}
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SSH Config Master ${{ github.ref_name }}'
          releaseBody: |
            ## 下载说明

            根据你的系统和架构选择对应安装包：

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | x86_64 | `*_x64-setup.exe` 或 `*_x64_en-US.msi` |
            | Windows | ARM64 | `*_arm64-setup.exe` 或 `*_arm64_en-US.msi` |
            | macOS | Intel | `*_x64.dmg` |
            | macOS | Apple Silicon | `*_aarch64.dmg` |
            | Linux | x86_64 | `*_amd64.AppImage` 或 `*_amd64.deb` |
            | Linux | ARM64 | `*_aarch64.AppImage` 或 `*_aarch64.deb` |
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: --target ${{ matrix.target }}
